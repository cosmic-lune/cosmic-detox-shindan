        advice: "今、一番ゆらいでいるのは「火・心」の要素です。気持ちが落ち着かなかったり、人と話している時にドキドキしやすい状態が続いているかもしれません。心は精神や血の巡りを司る臓器とされ、興奮や動揺の影響を受けやすい場所です。就寝前にゆったりとした時間を作ることが、整えるサポートになります。",
      },
      earth: {
        name: "土（脾・思）",
        advice: "今、一番ゆらいでいるのは「土・脾」の要素です。同じことを何度も考えてしまい、頭の中がいっぱいになりやすい状態が続いているかもしれません。脾は思考や消化を司る臓器とされ、考えすぎる癖があると消化機能にも影響が出やすいと言われています。一度ノートに考えを書き出して、頭の外に出してみることをおすすめします。",
      },
      metal: {
        name: "金（肺・悲）",
        advice: "今、一番ゆらいでいるのは「金・肺」の要素です。一人になりたい、誰とも関わりたくないという気持ちが強くなっているかもしれません。肺は悲しみや呼吸を司る臓器とされ、孤独感や寂しさの影響を受けやすい場所です。深く呼吸をする時間を意識的に増やすことで、少しずつ整いやすくなります。",
      },
      water: {
        name: "水（腎・恐）",
        advice: "今、一番ゆらいでいるのは「水・腎」の要素です。将来や老後について、説明できない不安や焦りを感じやすい状態が続いているかもしれません。腎は恐れや生命力を司る臓器とされ、不安感の影響を受けやすい場所です。体を温めること、十分な休息を取ることが、いたわるサポートになります。",
      },
    };

    function getResonanceAdvice(avg) {
      if (avg <= 1.75) return "周りの感情に振られにくく、自分の軸をしっかり保てているタイプです。今のバランスを大切にしてください。";
      if (avg <= 2.75) return "場所や人によっては、知らないうちにエネルギーをもらいやすいタイプかもしれません。人と会った後は、意識的に一人の時間を作ってリセットすることをおすすめします。";
      return "人混みや誰かの感情を、まるで自分のことのように引き受けやすいタイプのようです。人と会う前後に深呼吸をする、意識的に距離を取る時間を作るなど、自分を守る工夫が助けになります。";
    }

    const COLORS = {
      bg: "#0E1024",
      panel: "#161A38",
      panelBorder: "rgba(242,200,121,0.16)",
      text: "#F5F1E8",
      muted: "#9097B8",
      coral: "#FF9B6A",
      gold: "#F2C879",
      teal: "#6FE2D6",
    };

    function CosmicDetoxShindan() {
      const [screen, setScreen] = useState("intro");
      const [step, setStep] = useState(0);
      const [answers, setAnswers] = useState([]);
      const [gaugeOn, setGaugeOn] = useState(false);
      const [copied, setCopied] = useState(false);

      useEffect(() => {
        if (screen === "result") {
          setGaugeOn(false);
          const t = setTimeout(() => setGaugeOn(true), 150);
          return () => clearTimeout(t);
        }
      }, [screen]);

      const start = () => { setStep(0); setAnswers([]); setScreen("question"); };
      const handleAnswer = (value) => {
        const next = [...answers, value];
        setAnswers(next);
        if (step < QUESTIONS.length - 1) setStep(step + 1);
        else setScreen("result");
      };
      const reset = () => { setStep(0); setAnswers([]); setScreen("intro"); };

      const groupScore = { gut: 0, liver: 0, lymph: 0, ans: 0, wuxing: 0, resonance: 0 };
      const groupCount = { gut: 0, liver: 0, lymph: 0, ans: 0, wuxing: 0, resonance: 0 };
      const wuxingByElement = {};
      QUESTIONS.forEach((q, i) => {
        const v = answers[i];
        if (typeof v !== "number" || q.group === "bridge") return;
        groupScore[q.group] += v;
        groupCount[q.group] += 1;
        if (q.group === "wuxing") wuxingByElement[q.element] = v;
      });

      const groupPercent = {};
      AXIS_ORDER.forEach((g) => {
        const n = groupCount[g] || QUESTIONS.filter((q) => q.group === g).length;
        const max = n * 4;
        const min = n * 1;
        const score = groupScore[g] || min;
        groupPercent[g] = Math.round(100 - ((score - min) / (max - min)) * 100);
      });

      const totalMin = AXIS_ORDER.reduce((s, g) => s + QUESTIONS.filter((q) => q.group === g).length * 1, 0);
      const totalMax = AXIS_ORDER.reduce((s, g) => s + QUESTIONS.filter((q) => q.group === g).length * 4, 0);
      const totalScore = AXIS_ORDER.reduce((s, g) => s + (groupScore[g] || 0), 0);
      const isComplete = answers.length === QUESTIONS.length;
      const overallPercent = isComplete
        ? Math.round(100 - ((totalScore - totalMin) / (totalMax - totalMin)) * 100)
        : 50;

      const softAvg = isComplete
        ? Math.round((groupPercent.gut + groupPercent.liver + groupPercent.lymph) / 3)
        : 50;
      const ansPercent = isComplete ? groupPercent.ans : 50;

      let pattern = "B";
      if (isComplete) {
        if (overallPercent >= 70) pattern = "C";
        else if (softAvg >= 55 && ansPercent < 50) pattern = "A";
      }

      function topTips(groupKeys, limit) {
        const items = [];
        QUESTIONS.forEach((q, i) => {
          if (groupKeys.includes(q.group) && q.tip && typeof answers[i] === "number" && answers[i] >= 3) {
            items.push({ value: answers[i], tip: q.tip });
          }
        });
        items.sort((a, b) => b.value - a.value);
        return items.slice(0, limit).map((it) => it.tip);
      }
      const foodTips = isComplete ? topTips(["gut", "liver"], 2) : [];
      const lifeTips = isComplete ? topTips(["lymph", "ans"], 2) : [];

      const wuxingOrder = ["wood", "fire", "earth", "metal", "water"];
      const topElement = isComplete
        ? wuxingOrder.reduce((best, k) => ((wuxingByElement[k] || 0) > (wuxingByElement[best] || 0) ? k : best), wuxingOrder[0])
        : null;

      const resonanceAvg = isComplete
        ? (groupScore.resonance || 0) / (QUESTIONS.filter((q) => q.group === "resonance").length)
        : 2;

      const BRIDGE = {
        A: {
          lead: "今回の回答を見る限り、食事や生活習慣にはすでにしっかり気を配っていらっしゃるようです。それでもなかなか変化を感じにくいとしたら、それは頑張りが足りないからではありません。土台となる自律神経そのものが、その頑張りをうまく受け取れていない状態にあるのかもしれません。これは、食べ物や根性で直接働きかけることが難しい領域です。",
          cta: "今が、まさに土台を見直すタイミングだと思います。",
        },
        B: {
          lead: "今は、土台となる自律神経も、毎日の生活習慣も、どちらも少しお疲れ気味のようです。どちらから整えていただいても間違いではありませんが、一番早く変化を感じやすいのは、実は土台となる自律神経からアプローチすることだと言われています。",
          cta: "毎日の生活習慣と一緒に、土台となる自律神経も整えていきませんか。",
        },
        C: {
          lead: "今の生活習慣の状態は、かなり整っているようです。ここからは、土台となる自律神経のメンテナンスを定期的に行うことで、今の良い状態をより長く保ちやすくなります。",
          cta: "今の良い状態を保つために、定期的に整える時間を取り入れてみてください。",
        },
      };

      const r = 70;
      const circumference = 2 * Math.PI * r;
      const offset = gaugeOn
        ? circumference - circumference * (overallPercent / 100)
        : circumference;

      const copyResult = async () => {
        const text = `【デトックス度診断】\nデトックス度 ${overallPercent}%\n今、一番揺れてるのは「${topElement ? WUXING_INFO[topElement].name : ""}」\n\n#デトックス度診断 #Healy #バイオレゾナンス`;
        try {
          await navigator.clipboard.writeText(text);
          setCopied(true);
          setTimeout(() => setCopied(false), 2200);
        } catch (e) {
          setCopied(false);
        }
      };

      return (
        <div style={{
          minHeight: "100vh", width: "100%",
          background: "radial-gradient(circle at 50% -10%, #232753 0%, #0E1024 55%)",
          display: "flex", alignItems: "center", justifyContent: "center",
          padding: "24px 16px",
          fontFamily: "'Zen Kaku Gothic New', sans-serif",
        }}>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@500;600&display=swap');
            .breathe { animation: breathe 2.6s ease-in-out infinite; }
            @keyframes breathe {
              0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(242,200,121,0.0); }
              50% { transform: scale(1.025); box-shadow: 0 0 24px 2px rgba(242,200,121,0.25); }
            }
            .answer-btn { transition: border-color .2s ease, background-color .2s ease, transform .15s ease; }
            .answer-btn:hover { border-color: rgba(242,200,121,0.55); background-color: rgba(242,200,121,0.06); transform: translateY(-1px); }
            .answer-btn:focus-visible { outline: 2px solid #F2C879; outline-offset: 2px; }
            .cta-btn:focus-visible, .link-btn:focus-visible { outline: 2px solid #F2C879; outline-offset: 2px; }
            .barfill { transition: width .8s ease-out; }
            @media (prefers-reduced-motion: reduce) {
              .breathe, .barfill, .answer-btn, .gauge-arc { animation: none !important; transition: none !important; }
            }
          `}</style>

          <div style={{
            width: "100%", maxWidth: 440,
            background: COLORS.panel,
            border: `1px solid ${COLORS.panelBorder}`,
            borderRadius: 28,
            padding: "36px 26px",
            boxShadow: "0 24px 60px rgba(0,0,0,0.45)",
            color: COLORS.text,
          }}>
            {screen === "intro" && (
              <div style={{ textAlign: "center" }}>
                <div style={{ display: "flex", justifyContent: "center", marginBottom: 18 }}>
                  <Sparkles size={28} color={COLORS.gold} />
                </div>
                <p style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 12, letterSpacing: "0.1em", color: COLORS.teal, marginBottom: 14 }}>
                  全33問・ガチ勢向け本格診断
                </p>
                <h1 style={{ fontFamily: "'Shippori Mincho', serif", fontWeight: 700, fontSize: 25, lineHeight: 1.5, marginBottom: 10, color: COLORS.text }}>
                  デトックス度診断
                </h1>
                <p style={{ fontSize: 13, color: COLORS.gold, marginBottom: 18 }}>
                  〜体の声、見逃していませんか？〜
                </p>
                <p style={{ color: COLORS.text, fontSize: 13.5, lineHeight: 1.9, marginBottom: 26 }}>
                  腸内環境・肝臓解毒・血流リンパ・自律神経・感情（五行）・共鳴体質。<br />
                  6つの視点から、今のあなたを覗いてみる診断です。
                </p>
                <button onClick={start} className="breathe cta-btn" style={{
                  width: "100%", padding: "16px 0", borderRadius: 18, border: "none",
                  background: `linear-gradient(135deg, ${COLORS.coral}, ${COLORS.gold})`,
                  color: "#1A1326", fontWeight: 700, fontSize: 16, cursor: "pointer",
                }}>
                  診断をはじめる →
                </button>
                <p style={{ fontSize: 11, color: COLORS.muted, marginTop: 14 }}>所要時間 約8分</p>
                <p style={{ fontSize: 10, color: COLORS.muted, marginTop: 24, }}>©2026 cosmic lune</p>
              </div>
            )}

            {screen === "question" && (
              <div>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: COLORS.muted, fontFamily: "'JetBrains Mono', monospace", marginBottom: 6 }}>
                  <span>{GROUP_INFO[QUESTIONS[step].group]?.label || "橋渡し"}</span>
                  <span>Q{String(step + 1).padStart(2, "0")} / {QUESTIONS.length}</span>
                </div>
                <div style={{ height: 5, borderRadius: 999, background: "rgba(255,255,255,0.12)", marginBottom: 24, overflow: "hidden" }}>
                  <div className="barfill" style={{
                    height: "100%",
                    width: `${((step + 1) / QUESTIONS.length) * 100}%`,
                    background: `linear-gradient(90deg, ${COLORS.coral}, ${COLORS.gold})`,
                    borderRadius: 999,
                  }} />
                </div>
                <h2 style={{ fontFamily: "'Shippori Mincho', serif", fontSize: 19, lineHeight: 1.7, fontWeight: 500, marginBottom: 24 }}>
                  {QUESTIONS[step].text}
                </h2>
                <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                  {QUESTIONS[step].options.map((opt, i) => (
                    <button key={i} onClick={() => handleAnswer(opt.value)} className="answer-btn" style={{
                      textAlign: "left", padding: "14px 16px", borderRadius: 16,
                      border: "1px solid rgba(255,255,255,0.14)",
                      background: "rgba(255,255,255,0.03)",
                      color: COLORS.text, fontSize: 14, lineHeight: 1.6, cursor: "pointer",
                    }}>
                      {opt.label}
                    </button>
                  ))}
                </div>
              </div>
            )}

            {screen === "result" && (
              <div>
                <div style={{ display: "flex", justifyContent: "center", marginBottom: 18 }}>
                  <svg width="160" height="160" viewBox="0 0 160 160">
                    <defs>
                      <linearGradient id="gaugeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stopColor={COLORS.coral} />
                        <stop offset="100%" stopColor={COLORS.teal} />
                      </linearGradient>
                    </defs>
                    <circle cx="80" cy="80" r={r} fill="none" stroke="rgba(255,255,255,0.10)" strokeWidth="10" />
                    <circle
                      className="gauge-arc"
                      cx="80" cy="80" r={r} fill="none"
                      stroke="url(#gaugeGrad)" strokeWidth="10" strokeLinecap="round"
                      strokeDasharray={circumference} strokeDashoffset={offset}
                      transform="rotate(-90 80 80)"
                      style={{ transition: "stroke-dashoffset 1.3s ease-out" }}
                    />
                    <text x="80" y="76" textAnchor="middle" fontFamily="'JetBrains Mono', monospace" fontSize="30" fontWeight="600" fill={COLORS.text}>
                      {overallPercent}%
                    </text>
                    <text x="80" y="96" textAnchor="middle" fontFamily="'JetBrains Mono', monospace" fontSize="11" fill={COLORS.muted}>
                      デトックス度
                    </text>
                  </svg>
                </div>

                <div style={{ border: `1px solid ${COLORS.panelBorder}`, borderRadius: 16, padding: "16px 16px 14px", marginBottom: 20 }}>
                  <p style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, letterSpacing: "0.08em", color: COLORS.muted, marginBottom: 10 }}>
                    6つの視点で見た内訳
                  </p>
                  <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                    {AXIS_ORDER.map((key) => {
                      const val = groupPercent[key];
                      return (
                        <div key={key}>
                          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11.5, color: COLORS.muted, marginBottom: 4 }}>
                            <span>{GROUP_INFO[key].label}</span><span>{val}%</span>
                          </div>
                          <div style={{ height: 6, borderRadius: 999, background: "rgba(255,255,255,0.10)", overflow: "hidden" }}>
                            <div className="barfill" style={{
                              height: "100%", width: `${val}%`, borderRadius: 999,
                              background: GROUP_INFO[key].color,
                            }} />
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>

                <div style={{ marginBottom: 16 }}>
                  <h3 style={{ fontFamily: "'Shippori Mincho', serif", fontSize: 15, fontWeight: 700, marginBottom: 8, color: COLORS.gold }}>食事アドバイス</h3>
                  {foodTips.length > 0 ? (
                    <ul style={{ paddingLeft: 18, margin: 0, fontSize: 13, lineHeight: 1.9, color: "rgba(245,241,232,0.9)" }}>
                      {foodTips.map((t, i) => <li key={i} style={{ marginBottom: 6 }}>{t}</li>)}
                    </ul>
                  ) : (
                    <p style={{ fontSize: 13, lineHeight: 1.9, color: "rgba(245,241,232,0.9)" }}>
                      今のところ、食事面で大きな乱れは見られません。今のペースを保っていただいて大丈夫です。
                    </p>
                  )}
                </div>

                <div style={{ marginBottom: 16 }}>
                  <h3 style={{ fontFamily: "'Shippori Mincho', serif", fontSize: 15, fontWeight: 700, marginBottom: 8, color: COLORS.gold }}>生活習慣アドバイス</h3>
                  {lifeTips.length > 0 ? (
                    <ul style={{ paddingLeft: 18, margin: 0, fontSize: 13, lineHeight: 1.9, color: "rgba(245,241,232,0.9)" }}>
                      {lifeTips.map((t, i) => <li key={i} style={{ marginBottom: 6 }}>{t}</li>)}
                    </ul>
                  ) : (
                    <p style={{ fontSize: 13, lineHeight: 1.9, color: "rgba(245,241,232,0.9)" }}>
                      生活習慣も、今のところ大きな乱れは見られません。
                    </p>
                  )}
                </div>

                <div style={{ borderTop: `1px solid ${COLORS.panelBorder}`, paddingTop: 16, marginBottom: 16 }}>
                  <h3 style={{ fontFamily: "'Shippori Mincho', serif", fontSize: 15, fontWeight: 700, marginBottom: 8, color: COLORS.gold }}>五行からのアドバイス</h3>
                  <p style={{ fontSize: 13, lineHeight: 1.9, color: "rgba(245,241,232,0.9)", marginBottom: 14 }}>
                    {topElement ? WUXING_INFO[topElement].advice : ""}
                  </p>
                  <h3 style={{ fontFamily: "'Shippori Mincho', serif", fontSize: 15, fontWeight: 700, marginBottom: 8, color: COLORS.gold }}>共鳴体質</h3>
                  <p style={{ fontSize: 13, lineHeight: 1.9, color: "rgba(245,241,232,0.9)" }}>
                    {getResonanceAdvice(resonanceAvg)}
                  </p>
                </div>

                <div style={{ borderTop: `1px solid ${COLORS.panelBorder}`, paddingTop: 16, marginBottom: 18 }}>
                  <p style={{ fontSize: 13, lineHeight: 1.9, color: "rgba(245,241,232,0.9)", marginBottom: 12 }}>
                    ここまでのアドバイスは、食事や生活習慣として、今日から少しずつ取り入れていただけるものです。腸内環境も、肝臓も、血流やリンパも、すべて体の中で働き続けている仕組みです。そしてそれらが正常に働くための土台になっているのが、自律神経です。
                  </p>
                  <p style={{ fontSize: 13, lineHeight: 1.9, color: "rgba(245,241,232,0.9)", marginBottom: 12 }}>
                    食事や生活習慣は、いわば毎日アップデートしていく「ソフトウェア」のようなものです。一方で、自律神経は、そのソフトウェアを動かしている「ハードウェア」そのものにあたります。ソフトウェアだけをいくら整えても、土台となるハードウェアが乱れていると、その効果を十分に受け取れないことがあります。
                  </p>
                  <p style={{ fontSize: 13, lineHeight: 1.9, color: "rgba(245,241,232,0.9)", marginBottom: 12 }}>
                    {BRIDGE[pattern].lead}
                  </p>
                  <p style={{ fontSize: 13, lineHeight: 1.9, color: "rgba(245,241,232,0.9)", marginBottom: 14 }}>
                    自律神経は、食事のように直接「食べて整える」ことが難しく、根性のように「気合いで変える」こともできない場所です。そこにアプローチする方法のひとつとして、周波数を使って体の反応を観察する「バイオレゾナンス」という考え方があります。Healyは、このバイオレゾナンスの仕組みを使ったセルフケアデバイスです。体に直接周波数を当てて、その時々の反応をそのまま観察することができます。
                  </p>
                  <p style={{ fontSize: 13.5, fontWeight: 700, color: COLORS.gold, borderTop: `1px solid ${COLORS.panelBorder}`, paddingTop: 12 }}>
                    {BRIDGE[pattern].cta}
                  </p>
                </div>

                <a href={HEALY_SESSION_URL} target="_blank" rel="noreferrer" className="cta-btn" style={{
                  display: "block", textAlign: "center", width: "100%", padding: "15px 0",
                  borderRadius: 16,
                  background: `linear-gradient(135deg, ${COLORS.coral}, ${COLORS.gold})`,
                  color: "#1A1326", fontWeight: 700, fontSize: 14.5, textDecoration: "none", marginBottom: 10,
                }}>
                  Healy個別セッションを覗いてみる
                </a>

                <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
                  <a href={NOTE_URL} target="_blank" rel="noreferrer" className="link-btn" style={{
                    flex: 1, textAlign: "center", padding: "12px 0", borderRadius: 14,
                    border: "1px solid rgba(255,255,255,0.18)", color: COLORS.text, fontSize: 13, textDecoration: "none",
                  }}>noteで深く知る</a>
                  <a href={LINE_URL} target="_blank" rel="noreferrer" className="link-btn" style={{
                    flex: 1, textAlign: "center", padding: "12px 0", borderRadius: 14,
                    border: "1px solid rgba(255,255,255,0.18)", color: COLORS.text, fontSize: 13, textDecoration: "none",
                  }}>LINEで聞いてみる</a>
                </div>

                <button onClick={copyResult} className="link-btn" style={{
                  width: "100%", padding: "12px 0", borderRadius: 14,
                  border: "1px solid rgba(255,255,255,0.18)", background: "transparent",
                  color: COLORS.text, fontSize: 13, cursor: "pointer", marginBottom: 16,
                }}>
                  {copied ? "コピーしました！ストーリーに貼ってみて" : "診断結果をシェアする"}
                </button>

                <button onClick={reset} style={{
                  display: "block", margin: "0 auto", background: "none", border: "none",
                  color: COLORS.muted, fontSize: 12.5, textDecoration: "underline", cursor: "pointer",
                }}>
                  もう一度診断する
                </button>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<CosmicDetoxShindan />);
  </script>
</body>
</html>
